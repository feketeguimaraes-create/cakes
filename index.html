document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rmigueiro', cat:'classicos', hue:42, time:50, dif:'Fácil', serv:12,\n      desc:'Baunilha salpicada de chocolate granulado.',\n      ing:[{q:3,u:'un',n:'ovos'},{q:1,u:'xíc.',n:'leite'},{q:0.5,u:'xíc.',n:'manteiga'},{q:2,u:'xíc.',n:'açúcar'},{q:2.5,u:'xíc.',n:'farinha de trigo'},{q:0.5,u:'xíc.',n:'chocolate granulado'},{q:1,u:'colher sopa',n:'fermento em pó'}],\n      steps:[{t:'Bata a manteiga com o açúcar e os ovos.'},{t:'Alterne farinha e leite até ficar liso.'},{t:'Misture o granulado e o fermento delicadamente.'},{t:'Asse a 180°C por 40 minutos.',timer:40}] },\n\n    { id:'fuba', name:'Bolo de fubá', cat:'raizes', hue:48, time:50, dif:'Fácil', serv:12,\n      desc:'Rústico e cremoso, com erva-doce opcional.',\n      ing:[{q:3,u:'un',n:'ovos'},{q:2,u:'xíc.',n:'leite'},{q:0.5,u:'xíc.',n:'óleo'},{q:2,u:'xíc.',n:'açúcar'},{q:1.5,u:'xíc.',n:'fubá'},{q:1,u:'xíc.',n:'farinha de trigo'},{q:1,u:'colher sopa',n:'fermento em pó'}],\n      steps:[{t:'Bata ovos, leite, óleo e açúcar no liquidificador.'},{t:'Acrescente o fubá e a farinha, batendo bem.'},{t:'Misture o fermento por último.'},{t:'Asse a 180°C por 40 minutos.',timer:40}] },\n    { id:'milho', name:'Bolo de milho', cat:'raizes', hue:50, time:50, dif:'Fácil', serv:12,\n      desc:'Feito com milho verde no liquidificador, super úmido.',\n      ing:[{q:1,u:'lata',n:'milho verde'},{q:3,u:'un',n:'ovos'},{q:0.5,u:'xíc.',n:'óleo'},{q:2,u:'xíc.',n:'açúcar'},{q:1,u:'xíc.',n:'leite'},{q:1.5,u:'xíc.',n:'fubá'},{q:1,u:'colher sopa',n:'fermento em pó'}],\n      steps:[{t:'Bata o milho escorrido com os ovos, o óleo e o leite.'},{t:'Acrescente açúcar e fubá, batendo bem.'},{t:'Misture o fermento à mão.'},{t:'Asse a 180°C por 40 minutos.',timer:40}] },\n    { id:'aipim', name:'Bolo de aipim', cat:'raizes', hue:46, time:60, dif:'Médio', serv:12,\n      desc:'Mandioca crua ralada com coco — denso e molhadinho.',\n      ing:[{q:1,u:'kg',n:'aipim (mandioca) cru ralado'},{q:3,u:'un',n:'ovos'},{q:2,u:'xíc.',n:'açúcar'},{q:1,u:'xíc.',n:'coco ralado'},{q:2,u:'colher sopa',n:'manteiga'},{q:1,u:'xíc.',n:'leite'}],\n      steps:[{t:'Bata os ovos com o açúcar e a manteiga.'},{t:'Adicione o aipim ralado, o coco e o leite.'},{t:'Misture tudo até formar massa homogênea.'},{t:'Asse a 180°C por 50 minutos.',timer:50}] },\n\n    { id:'indiano', name:'Bolo indiano', cat:'especiais', hue:22, time:70, dif:'Médio', serv:12,\n      desc:'Massa de coco em duas camadas com calda de chocolate.',\n      ing:[{q:4,u:'un',n:'ovos'},{q:2,u:'xíc.',n:'açúcar'},{q:2,u:'xíc.',n:'farinha de trigo'},{q:1,u:'xíc.',n:'leite'},{q:1,u:'xíc.',n:'coco ralado'},{q:1,u:'colher sopa',n:'fermento em pó'},{q:1,u:'xíc.',n:'chocolate em pó'}],\n      steps:[{t:'Bata os ovos com o açúcar até dobrar de volume.'},{t:'Alterne farinha e leite; junte o coco e o fermento.'},{t:'Separe metade da massa e misture o chocolate nela.'},{t:'Coloque as duas massas na forma em camadas.'},{t:'Asse a 180°C por 45 minutos.',timer:45},{t:'Cubra com calda de chocolate.'}] },\n    { id:'queijadinha', name:'Bolo queijadinha', cat:'especiais', hue:47, time:55, dif:'Médio', serv:10,\n      desc:'Sabor de queijadinha em bolo: coco, queijo e leite condensado.',\n      ing:[{q:3,u:'un',n:'ovos'},{q:1,u:'lata',n:'leite condensado'},{q:1,u:'xíc.',n:'coco ralado'},{q:1,u:'xíc.',n:'queijo parmesão ralado'},{q:1,u:'xíc.',n:'leite'},{q:1.5,u:'xíc.',n:'farinha de trigo'},{q:1,u:'colher sopa',n:'fermento em pó'}],\n      steps:[{t:'Bata os ovos com o leite condensado e o leite.'},{t:'Acrescente o coco e o queijo ralado.'},{t:'Misture a farinha e o fermento.'},{t:'Asse a 180°C por 45 minutos.',timer:45}] },\n  ];\n\n  // ---- helpers ----\n  cake() { return this.cakes.find(c => c.id === this.state.cakeId) || this.cakes[0]; }\n  factor() { const c = this.cake(); return (this.state.servings || c.serv) / c.serv; }\n\n  frac(n) {\n    const whole = Math.floor(n + 1e-6);\n    const r = n - whole;\n    const q = Math.round(r * 4) / 4;\n    const glyph = { 0.25:'¼', 0.5:'½', 0.75:'¾' };\n    if (q === 1) return String(whole + 1);\n    if (q === 0) return String(whole);\n    return whole > 0 ? whole + ' ' + glyph[q] : glyph[q];\n  }\n  fmtQty(ing) {\n    const val = ing.q * this.factor();\n    const wholeUnits = ['un','lata','kg'];\n    if (wholeUnits.includes(ing.u)) return Math.max(1, Math.round(val)) + ' ' + ing.u;\n    const rounded = wholeUnits.includes(ing.u) ? Math.round(val) : val;\n    return this.frac(rounded) + ' ' + ing.u;\n  }\n\n  // returns {name, orig} after applying active restriction swaps\n  swap(ing) {\n    const r = this.state.r;\n    const low = ing.n.toLowerCase();\n    const lac = r.lactose || r.vegano;\n    let name = ing.n, changed = false;\n    if (lac && low.includes('leite condensado')) { name = 'leite condensado vegetal'; changed = true; }\n    else if (lac && low.includes('creme de leite')) { name = 'creme de leite de coco'; changed = true; }\n    else if (lac && low.includes('leite')) { name = ing.n.replace(/leite/i, 'leite de aveia'); changed = true; }\n    if (lac && low.includes('manteiga')) { name = 'margarina vegetal'; changed = true; }\n    if (lac && (low.includes('queijo') || low.includes('parmesão'))) { name = 'queijo vegetal ralado'; changed = true; }\n    if (r.vegano && (low === 'ovos' || low.includes('ovos') || low.includes('ovo'))) { name = 'ovo de linhaça'; changed = true; }\n    if (r.acucar && low.includes('açúcar')) { name = ing.n.replace(/açúcar( mascavo)?/i, 'xilitol'); changed = true; }\n    if (r.oleaginosa && (low.includes('noz') || low.includes('castanha') || low.includes('amêndoa'))) { name = 'passas'; changed = true; }\n    if (r.oleaginosa && low.includes('coco ralado')) { name = 'flocos de aveia'; changed = true; }\n    return { name, orig: changed ? ing.n : null };\n  }\n\n  activeRestrList() {\n    const r = this.state.r, out = [];\n    if (r.vegano) out.push('vegana'); else if (r.lactose) out.push('sem lactose');\n    if (r.acucar) out.push('sem açúcar');\n    if (r.oleaginosa) out.push('sem oleaginosas');\n    return out;\n  }\n\n  computedIngredients() {\n    const c = this.cake();\n    return c.ing.map((ing, i) => {\n      const s = this.swap(ing);\n      const isChecked = !!this.state.checked[i];\n      return {\n        qty: this.fmtQty(ing), name: s.name, orig: s.orig,\n        toggle: () => this.setState(st => ({ checked: { ...st.checked, [i]: !st.checked[i] } })),\n        check: isChecked ? '✓' : '',\n        boxStyle: 'flex:none;width:24px;height:24px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;' + (isChecked ? 'background:#8B9B4F;color:#fff;border:1.5px solid #8B9B4F' : 'background:#fff;color:#fff;border:1.5px solid #D8C6AC'),\n        textStyle: isChecked ? 'opacity:.4;text-decoration:line-through' : '',\n      };\n    });\n  }\n\n  // ---- timer ----\n  componentWillUnmount() { clearInterval(this._iv); }\n  tickStart() {\n    clearInterval(this._iv);\n    this._iv = setInterval(() => {\n      this.setState(st => {\n        if (!st.timerOn || st.timerLeft <= 0) return { timerOn: false };\n        return { timerLeft: st.timerLeft - 1 };\n      });\n    }, 1000);\n  }\n  currentStep() { return this.cake().steps[this.state.cookStep]; }\n  toggleTimer() {\n    const step = this.currentStep();\n    this.setState(st => {\n      if (st.timerOn) return { timerOn: false };\n      const left = st.timerLeft > 0 ? st.timerLeft : (step.timer || 1) * 60;\n      return { timerOn: true, timerLeft: left };\n    }, () => this.tickStart());\n  }\n\n  renderVals() {\n    const S = this.state;\n    const c = this.cake();\n    const tile = (h, extra) => `background:repeating-linear-gradient(45deg,hsl(${h} 42% 84%),hsl(${h} 42% 84%) 11px,hsl(${h} 40% 88%) 11px,hsl(${h} 40% 88%) 22px);display:flex;align-items:center;justify-content:center;${extra}`;\n\n    const q = S.query.trim().toLowerCase();\n    const grid = this.cakes\n      .filter(ck => S.cat === 'todos' || ck.cat === S.cat)\n      .filter(ck => !q || ck.name.toLowerCase().includes(q))\n      .map(ck => ({\n        name: ck.name, time: ck.time, dif: ck.dif, emojiTxt: ck.name.replace('Bolo de ','').replace('Bolo ',''),\n        tileStyle: tile(ck.hue, 'height:96px'),\n        onClick: () => this.setState({ screen: 'detail', cakeId: ck.id, servings: ck.serv, cookStep: 0, timerOn: false, timerLeft: 0, checked: {} }),\n      }));\n\n    const chips = this.cats.map(cat => ({\n      label: cat.label,\n      onClick: () => this.setState({ cat: cat.id }),\n      style: 'flex:none;border:none;cursor:pointer;padding:9px 16px;border-radius:11px;font:600 13.5px \"Karla\";' +\n        (S.cat === cat.id ? 'background:#3A2E26;color:#F4E9DA' : 'background:#FBF7F0;color:#7A6656;border:1px solid #E2D6C4'),\n    }));\n\n    const restrDefs = [\n      { key:'lactose', label:'Sem lactose' }, { key:'vegano', label:'Vegano' },\n      { key:'acucar', label:'Sem açúcar' }, { key:'oleaginosa', label:'Sem oleaginosas' },\n    ];\n    const restrPills = restrDefs.map(d => {\n      const on = S.r[d.key];\n      return {\n        label: d.label,\n        onClick: () => this.setState(st => ({ r: { ...st.r, [d.key]: !st.r[d.key] } })),\n        style: 'border:none;cursor:pointer;padding:10px 15px;border-radius:12px;font:600 13.5px \"Karla\";' +\n          (on ? 'background:#8B9B4F;color:#fff' : 'background:#FBF7F0;color:#6E7A44;border:1.5px solid #CFD8B4'),\n      };\n    });\n\n    const ingredients = this.computedIngredients();\n    const activeList = this.activeRestrList();\n\n    const steps = c.steps;\n    const stepsPreview = steps.map((s, i) => ({ num: i + 1, t: s.t }));\n    const cur = steps[S.cookStep] || steps[0];\n    const cookDots = steps.map((s, i) => ({\n      style: 'flex:1;height:4px;border-radius:2px;' + (i <= S.cookStep ? 'background:#D9964F' : 'background:rgba(244,233,218,.18)'),\n    }));\n    const mm = String(Math.floor(S.timerLeft / 60)).padStart(2, '0');\n    const ss = String(S.timerLeft % 60).padStart(2, '0');\n    const lastStep = S.cookStep >= steps.length - 1;\n\n    return {\n      isHome: S.screen === 'home', isDetail: S.screen === 'detail',\n      isCook: S.screen === 'cook', isShopping: S.screen === 'shopping',\n      query: S.query, onSearch: e => this.setState({ query: e.target.value }),\n      chips, grid, cake: c,\n      heroStyle: tile(c.hue, 'height:210px;position:relative;flex-direction:column;gap:0'),\n      restrPills, hasRestr: activeList.length > 0, restrLabel: activeList.join(' · '),\n      servings: S.servings || c.serv,\n      incServings: () => this.setState(st => ({ servings: (st.servings || c.serv) + 2 })),\n      decServings: () => this.setState(st => ({ servings: Math.max(2, (st.servings || c.serv) - 2) })),\n      ingredients, stepsPreview,\n      goHome: () => this.setState({ screen: 'home', query: '' }),\n      startCook: () => this.setState({ screen: 'cook', cookStep: 0, timerOn: false, timerLeft: 0 }),\n      goShopping: () => this.setState({ screen: 'shopping' }),\n      backToDetail: () => this.setState({ screen: 'detail' }),\n      // cook\n      cookNum: S.cookStep + 1, cookTotal: steps.length, cookText: cur.t, cookDots,\n      hasTimer: !!cur.timer, timerDisplay: mm + ':' + ss, timerBtn: S.timerOn ? 'Pausar' : (S.timerLeft > 0 ? 'Continuar' : 'Iniciar'),\n      toggleTimer: () => this.toggleTimer(),\n      exitCook: () => { clearInterval(this._iv); this.setState({ screen: 'detail', timerOn: false }); },\n      prevStep: () => this.setState(st => ({ cookStep: Math.max(0, st.cookStep - 1), timerOn: false, timerLeft: 0 })),\n      nextStep: () => { if (lastStep) { clearInterval(this._iv); this.setState({ screen: 'detail', timerOn: false }); } else { this.setState(st => ({ cookStep: st.cookStep + 1, timerOn: false, timerLeft: 0 })); } },\n      nextLabel: lastStep ? 'Concluir ✓' : 'Próximo passo',\n      prevStyle: 'flex:none;width:96px;height:56px;border:1.5px solid rgba(244,233,218,.28);background:none;border-radius:16px;color:#F4E9DA;font:600 16px \"Karla\";cursor:pointer' + (S.cookStep === 0 ? ';opacity:.35' : ''),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
